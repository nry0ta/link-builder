<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>

    <header class="app-header">
        <div class="container">
            <a href="/home.html" class="header-logo">Link Builder <span class="version-tag">β ver. 2.1</span></a>
        </div>
        <div class="header-controls">
            <a href="/usage.html" class="header-text-link">使い方</a>
            <a href="/setting.html" class="setting-button">設定</a>
        </div>
    </header>

    <div class="container">
        <h1>設定</h1>
        <p>APIキーやアフィリエイトIDを保存します。この情報はあなたのブラウザ内にのみ保存されます。<br>各プラットフォームのIDの取得方法などはこちらをご覧ください。</p>

        <hr> <h3>楽天アフィリエイト</h3>
        
        <div class="form-group">
            <label for="rakutenAppId">楽天アプリケーションID (AppID)</label>
            <input type="text" id="rakutenAppId" placeholder="楽天ウェブサービスから取得したID">
        </div>

        <div class="form-group">
            <label for="rakutenAffiliateId">楽天アフィリエイトID</label>
            <input type="text" id="rakutenAffiliateId" placeholder="楽天アフィリエイトのID">
        </div>

        <hr> <h3>バリューコマース</h3>

        <div class="form-group">
            <label for="vcSid">SID (サイトID)</label>
            <input type="text" id="vcSid" placeholder="バリューコマースのサイトID">
        </div>

        <div class="form-group">
            <label for="vcPidJalan">じゃらんnet PID (広告ID)</label>
            <input type="text" id="vcPidJalan" placeholder="じゃらんnetの広告ID (PID)">
        </div>

        <div class="form-group">
            <label for="vcPidIkkyu">一休.com PID (広告ID)</label>
            <input type="text" id="vcPidIkkyu" placeholder="一休.comの広告ID (PID)">
        </div>

        <div class="form-group">
            <label for="vcPidYahoo">Yahoo!トラベル PID (広告ID)</label>
            <input type="text" id="vcPidYahoo" placeholder="Yahoo!トラベルの広告ID (PID)">
        </div>

        <hr> <h3>アクセストレード</h3>
        
        <div class="form-group">
            <label for="atRkihg">IHG (rk)</label>
            <input type="text" id="atRkihg" placeholder="商品リンクのcc?rk=〇〇の部分">
        </div>

        <div class="form-group">
            <label for="atRkjphotels">jp.hotels.com (rk)</label>
            <input type="text" id="atRkjphotels" placeholder="商品リンクのcc?rk=〇〇の部分">
        </div>

        <hr> <h3>リンクシェア</h3>
        <p>リンクシェアのIDは楽天トラベル、Trip.com、トリバゴ共通です。
        </p>
        
        <div class="form-group">
            <label for="lsid">リンクシェア (ID)</label>
            <input type="text" id="lsid" placeholder="リンクシェアのID">
        </div>

        <hr>

        
        <button id="saveButton">設定を保存</button>
    

        <div id="notificationArea"></div>
    </div>
    
    <script src="setting.js"></script>

</body>
</html>
