<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js"></script>
    <title>リンクビルダー</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="link-builder-styles.css">
</head>
<body class="page-builder">

    <header class="app-header">
        <div class="container">
            <a href="/home.html" class="header-logo">Link Builder <span class="version-tag">β ver. 2.1</span></a>
        </div>
        <div class="header-controls">
            <a href="/usage.html" class="header-text-link">使い方</a>
            <a href="/setting.html" class="setting-button">設定</a>
        </div>
    </header>
    <div class="container">
        <h1>リンクを作成</h1>
        <p>選択したホテルの情報をもとに、ブログに貼り付けるリンクを作成します。</p>

        <div class="form-group">
            <label for="hotelName">ホテル名</label>
            <input type="text" id="hotelName" >
        </div>

        <div class="form-group">
            <label for="searchKeyword">検索ワード</label>
            <input type="text" id="searchKeyword">
        </div>

        <hr>

        <h3>デザインを選択</h3>
        <p>各デザインの導入前に予めブログやサイトに指定のCSSを設定していただく必要があります。<br>CSSの設定はこちら</p>

        <div class="form-group">
            <div class="design-selection">
                <button id="design-single-jump" class="design-btn" data-design="single">
                    特定のサイトへジャンプ
                </button>
                <button id="design-modal" class="design-btn" data-design="modal">
                    ひとつのボタンから複数のサイトを選択
                </button>
                <button id="design-multiple-btn" class="design-btn" data-design="multiple">
                    それぞれの予約サイトへのボタンを用意
                </button>
            </div>
        </div>

        <hr> 

        <div id="siteSelectionSection"> 
            <h3>アフィリエイトサイトを選択</h3>
            
            <p id="siteSelectionGuide" class="guide-message"></p> 
        <div class="site-selection">
            <div><input type="checkbox" id="select-rakuten" data-site="rakuten"><label for="select-rakuten">楽天トラベル</label></div>
            <div><input type="checkbox" id="select-jalan" data-site="jalan"><label for="select-jalan">じゃらんnet</label></div>
            <div><input type="checkbox" id="select-ikkyu" data-site="ikkyu"><label for="select-ikkyu">一休.com</label></div>
            <div><input type="checkbox" id="select-yahoo" data-site="yahoo"><label for="select-yahoo">Yahoo!トラベル</label></div>
            <div><input type="checkbox" id="select-booking" data-site="booking"><label for="select-booking">Booking.com</label></div>
            <div><input type="checkbox" id="select-hotelscom" data-site="hotelscom"><label for="select-booking">jp.Hotels.com</label></div>
            <div><input type="checkbox" id="select-ihg" data-site="ihg"><label for="select-ihg">【最安値】IHG公式</label></div>
            <div><input type="checkbox" id="select-tripcom" data-site="tripcom"><label for="select-tripcom">Trip.com (トップのみ)</label></div>
            <div><input type="checkbox" id="select-agoda" data-site="agoda"><label for="select-agoda">Agoda</label></div>
        </div>

        <div id="link-inputs-container">
            <div id="form-group-rakuten" class="form-group" hidden>
                <label for="rakutenUrl">楽天トラベル URL</label>
                <input type="text" id="rakutenUrl" placeholder="ご自身のアフィリエイトリンクに変換して貼り付け">
            </div>
            <div id="form-group-jalan" class="form-group" hidden>
                <label for="jalanUrl">じゃらんnet URL</label>
                <input type="text" id="jalanUrl" placeholder="アフィリエイトリンクを貼り付け">
            </div>
            <div id="form-group-ikkyu" class="form-group" hidden>
                <label for="ikkyuUrl">一休.com URL</label>
                <input type="text" id="ikkyuUrl" placeholder="アフィリエイトリンクを貼り付け">
            </div>
            <div id="form-group-yahoo" class="form-group" hidden>
                <label for="yahooUrl">Yahoo!トラベル URL</label>
                <input type="text" id="yahooUrl" placeholder="アフィリエイトリンクを貼り付け">
            </div>
            <div id="form-group-booking" class="form-group" hidden>
                <label for="bookingUrl">Booking.com URL</label>
                <input type="text" id="bookingUrl" placeholder="アフィリエイトリンクを貼り付け">
            </div>
            <div id="form-group-ihg" class="form-group" hidden>
                <label for="ihgUrl">IHG URL</label>
                <input type="text" id="ihgUrl" placeholder="アフィリエイトリンクを貼り付け">
            </div>
            <div id="form-group-tripcom" class="form-group" hidden>
                <label for="tripcomUrl">Trip.com URL</label>
                <input type="text" id="tripcomUrl" placeholder="アフィリエイトリンクを貼り付け">
            </div>
        </div>

        <hr>

        <div class="form-group" id="designEditSection">
            <h3>デザインを編集</h3>
            
            <div id="singleJumpEdit" class="design-edit-control" hidden>
                <label for="singleJumpText">ボタンテキスト</label>
                <p class="edit-guide">サイト名の後に表示されるテキストです。改行には&lt;br&gt;タグを使用できます。</p>
                <input type="text" id="singleJumpText">
            </div>
        
            <div id="modalEdit" class="design-edit-control" hidden>
                <label for="modalButtonText">ボタンテキスト</label>
                <p class="edit-guide">改行には&lt;br&gt;タグを使用できます。</p>
                <input type="text" id="modalButtonText">
            </div>
            
            <div id="multipleEdit" class="design-edit-control" hidden>
                <label for="multipleBtnText">ボタンテキスト (〇〇で今すぐみる)</label>
                <p class="edit-guide">サイト名の後に表示されるテキストです。</p>
                <input type="text" id="multipleBtnText"> 
                
                <div class="checkbox-control">
                    <input type="checkbox" id="showImageCheckbox" checked>
                    <label for="showImageCheckbox">ホテル画像を表示</label>
                </div>

                <div class="form-group" id="imageUrlSection" hidden>
                    <label for="imageUrl">画像のURL</label>
                    <input type="text" id="imageUrl">
                </div>
                
                <div class="checkbox-control">
                    <input type="checkbox" id="showAddressCheckbox" checked>
                    <label for="showAddressCheckbox">住所情報を表示</label>
                </div>

                <div class="form-group" id="hotelAddressSection"> 
                    <label for="hotelAddressDisplay">住所情報</label> 
                    <textarea id="hotelAddressDisplay" rows="3" readonly></textarea>
                </div>
                <hr>
            </div>
        </div>

        <button id="generateBtn">ブログ用コードを生成</button>
        <div id="generateBtnNotification" class="btn-notification"></div>

        <div id="outputSection" hidden>
            <h2>生成されたコード</h2>
            <textarea id="outputCode" rows="12" class="code-display" readonly></textarea>
            <button id="copyBtn" class="btn-secondary">コードをコピー</button>
            <div id="copyBtnNotification" class="btn-notification"></div>
        </div>

        <div id="previewSection" hidden>
            <h2>プレビュー</h2>
            <div id="previewArea"></div>
        </div>
    </div>

    <script type="module" src="builder.js"></script>
</body>
</html>
